plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

// 从 pubspec.yaml 读取版本号（格式：version: 1.0.5+5）
def flutterVersionCode = '1'
def flutterVersionName = '1.0'
def pubspecFile = new File("${project.rootDir.path}/../pubspec.yaml")
if (pubspecFile.exists()) {
    def matcher = pubspecFile.text =~ /version:\s*(\d+\.\d+\.\d+)\+(\d+)/
    if (matcher.find()) {
        flutterVersionName = matcher.group(1)
        flutterVersionCode = matcher.group(2)
    }
}
// local.properties 作为 fallback
if (flutterVersionCode == '1') {
    flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
}
if (flutterVersionName == '1.0') {
    flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'
}

android {
    namespace "com.bearbill.bear_bill"
    compileSdk 36

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.bearbill.bear_bill"
        minSdk 21
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
