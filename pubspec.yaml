name: bear_bill
description: 小熊记账本

publish_to: 'none'

version: 1.3.4+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 本地存储
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.3
  shared_preferences: ^2.2.2
  
  # 状态管理
  provider: ^6.1.1
  
  # UI 组件
  fl_chart: ^0.66.0
  flutter_slidable: ^3.0.1
  share_plus: ^7.2.1
  intl: ^0.18.1
  file_picker: ^6.1.1
  image_picker: ^1.0.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  permission_handler: ^11.0.0
  geolocator: ^10.1.0  # 降级到稳定版本，避免 Gradle 兼容性问题
  
  # 地图
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.2
  speech_to_text: ^6.6.0

  # 其他
  uuid: ^4.2.1
  collection: ^1.18.0
  archive: ^3.4.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-ExtraBold.ttf
          weight: 800
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope/Manrope-Bold.ttf
          weight: 700
        - asset: assets/fonts/Manrope/Manrope-ExtraBold.ttf
          weight: 800
